repo_path: "/repo"
database_url: "postgres://projectlens:projectlens@localhost:5433/projectlens?sslmode=disable"
index:
  include_patterns:
    - "**/*.go"
  exclude_patterns:
    - "**/vendor/**"
    - "**/third_party/**"
    - "**/testdata/**"
    - "**/*_test.go"
    - "**/node_modules/**"
  generated_markers:
    - "Code generated"
    - "DO NOT EDIT"
    - "_generated.go"
    - "_gen.go"
    - ".pb.go"
    - "_grpc.go"
    - "_string.go"
    - "zz_generated"

embeddings:
  provider: ollama
  model: mxbai-embed-large
  dimensions: 1024
  endpoint: http://localhost:11434

summarization:
  provider: anthropic
  model: claude-sonnet-4-6

datastore:
  engines:
    - name: postgres
      migration_paths:
        - "db/postgresql/metastore/migrations/*.up.sql"
  sql_scan_paths:
    - "core/**/*.go"
    - "service/**/*.go"
    - "pkg/**/*.go"
    - "pipelines/**/*.go"
