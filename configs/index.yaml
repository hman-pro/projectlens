# repo_path defaults to /repo, which matches the bind mount used by
# docker/docker-compose.yml. For local CLI/TUI runs outside Docker, set
# PROJECTLENS_REPO_PATH in your environment (.env or shell export) — env
# wins over this default.
repo_path: "/repo"
database_url: "postgres://projectlens:projectlens@localhost:5433/projectlens?sslmode=disable"
index:
  include_patterns:
    - "**/*.go"
  exclude_patterns:
    - "**/vendor/**"
    - "**/third_party/**"
    - "**/testdata/**"
    - "**/*_test.go"
    - "**/node_modules/**"
  generated_markers:
    - "Code generated"
    - "DO NOT EDIT"
    - "_generated.go"
    - "_gen.go"
    - ".pb.go"
    - "_grpc.go"
    - "_string.go"
    - "zz_generated"

embeddings:
  provider: ollama
  model: qwen3-embedding:0.6b
  dimensions: 1024
  endpoint: http://localhost:11434

summarization:
  enabled: false
  # Opt-in quality profile (heavy: 19GB download, requires a strong machine):
  # enabled: true
  # provider: ollama
  # model: qwen3-coder:30b
  # endpoint: http://localhost:11434

datastore:
  engines:
    - name: postgres
      migration_paths:
        - "migrations/*.up.sql"
  sql_scan_paths:
    - "**/*.go"

history:
  window_months: 12
  min_commits_per_file: 5
  coupling_min_cochanges: 5
  coupling_exclude_max_files: 20
